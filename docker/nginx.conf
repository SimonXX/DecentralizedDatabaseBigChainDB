server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy BigchainDB API calls to the nodes
    location /api/node1/ {
        proxy_pass http://coordinator1:9984/;
    }
    location /api/node2/ {
        proxy_pass http://member2:9984/;
    }
    location /api/node3/ {
        proxy_pass http://member3:9984/;
    }
    location /api/node4/ {
        proxy_pass http://member4:9984/;
    }

    # Proxy Tendermint RPC
    location /tm/node1/ {
        proxy_pass http://coordinator1:26657/;
    }
    location /tm/node2/ {
        proxy_pass http://member2:26657/;
    }
    location /tm/node3/ {
        proxy_pass http://member3:26657/;
    }
    location /tm/node4/ {
        proxy_pass http://member4:26657/;
    }
}
